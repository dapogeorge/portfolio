document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    if (e.target && e.target !== window && e.target.tagName) {
      var im = e.target;
      if (im.tagName === 'IMG' && !im.dataset.fb) {
        im.dataset.fb = '1';
        var nm = (im.getAttribute('alt') || (im.getAttribute('src')||'').split('/').pop() || '?').trim();
        var ch = (nm.charAt(0) || '?').toUpperCase();
        var cv = document.createElement('canvas'); cv.width = cv.height = 120;
        var cx = cv.getContext('2d');
        var g = cx.createLinearGradient(0,0,120,120); g.addColorStop(0,'#1f8a7a'); g.addColorStop(1,'#0f5e54');
        cx.fillStyle = g; cx.beginPath(); cx.arc(60,60,60,0,Math.PI*2); cx.fill();
        cx.fillStyle = 'rgba(255,255,255,.95)'; cx.font = '600 58px system-ui,sans-serif';
        cx.textAlign = 'center'; cx.textBaseline = 'middle'; cx.fillText(ch,60,63);
        try { im.src = cv.toDataURL('image/png'); } catch(_) {}
      }
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"da0c93e9-2928-4b3b-8bcc-ea3b28b765b6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"70bf172c-32c9-4cd4-a773-d38f9ee1d8c2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"da0c93e9-2928-4b3b-8bcc-ea3b28b765b6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Moyo Exchange — Wireframe system\n   Mid-fi, grayscale, friendly fintech. Clean ↔ sketchy toggle.\n   ============================================================ */\n\n:root {\n  /* warm grayscale ink ramp */\n  --paper: #ffffff;\n  --ink-900: #2b2b2e;\n  --ink-700: #4d4d52;\n  --ink-500: #828289;\n  --ink-400: #a8a8ae;\n  --ink-300: #cbcbcf;\n  --ink-200: #e2e1e0;\n  --ink-100: #efeeec;\n  --canvas: #f1f0ed;\n  --canvas-2: #e8e7e3;\n\n  /* accent (annotations + the one highlighted action). toggleable */\n  --accent: #e8853a;          /* coral/orange, echoes the flowchart */\n  --accent-soft: #fbe9da;\n  --accent-ink: #8a4a16;\n\n  --phone-scale: 0.82;\n\n  --r-lg: 22px;\n  --r-md: 13px;\n  --r-sm: 8px;\n\n  --font-ui: \"Plus Jakarta Sans\", system-ui, sans-serif;\n  --font-mono: \"Spline Sans Mono\", ui-monospace, monospace;\n  --font-hand: \"Architects Daughter\", \"Comic Sans MS\", cursive;\n\n  --screen-font: var(--font-ui);\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  background: var(--canvas);\n  color: var(--ink-900);\n  font-family: var(--font-ui);\n  -webkit-font-smoothing: antialiased;\n}\n\nbody {\n  background-image:\n    radial-gradient(circle at center, rgba(43,43,46,0.10) 1.1px, transparent 1.2px);\n  background-size: 26px 26px;\n  background-position: -7px -7px;\n}\n\n/* ---------- Top bar ---------- */\n.topbar {\n  position: sticky;\n  top: 0;\n  z-index: 40;\n  display: flex;\n  align-items: baseline;\n  gap: 16px;\n  padding: 22px 40px 18px;\n  background: linear-gradient(var(--canvas) 72%, transparent);\n  backdrop-filter: blur(2px);\n}\n.topbar h1 {\n  font-family: var(--font-mono);\n  font-size: 19px;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.topbar .tag {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--ink-500);\n}\n.topbar .legend {\n  margin-left: auto;\n  display: flex;\n  gap: 18px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-500);\n  align-items: center;\n}\n.legend .key { display: flex; align-items: center; gap: 6px; }\n.legend .dot { width: 11px; height: 11px; border-radius: 3px; }\n.legend .dot.start { border-radius: 50%; background: var(--ink-400); }\n.legend .dot.decision { background: var(--ink-700); transform: rotate(45deg); width:9px;height:9px;}\n.legend .dot.end { background: var(--accent); border-radius: 50%; }\n\n/* ---------- Board / journeys ---------- */\n.board { padding: 8px 0 120px; }\n\n.journey {\n  padding: 18px 40px 30px;\n}\n.journey-head {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin-bottom: 4px;\n}\n.journey-num {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--paper);\n  background: var(--ink-900);\n  width: 30px; height: 30px;\n  display: grid; place-items: center;\n  border-radius: 9px;\n}\n.journey-title {\n  font-family: var(--font-mono);\n  font-size: 17px;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.journey-desc {\n  font-size: 13px;\n  color: var(--ink-500);\n  margin: 0 0 0 2px;\n}\n.scrollhint {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-400);\n}\n\n/* horizontal storyboard rail */\n.rail {\n  margin-top: 18px;\n  display: flex;\n  align-items: flex-start;\n  gap: 0;\n  overflow-x: auto;\n  overflow-y: visible;\n  padding: 14px 6px 26px;\n  scrollbar-width: thin;\n  scrollbar-color: var(--ink-300) transparent;\n}\n.rail::-webkit-scrollbar { height: 9px; }\n.rail::-webkit-scrollbar-thumb { background: var(--ink-300); border-radius: 6px; }\n.rail::-webkit-scrollbar-track { background: transparent; }\n\n/* a step in the rail (a phone + caption), scaled */\n.step {\n  flex: 0 0 auto;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 10px;\n}\n.step-stack { /* phone + its scaled wrapper */\n  width: calc(300px * var(--phone-scale));\n}\n.step .cap {\n  width: calc(300px * var(--phone-scale) + 16px);\n  text-align: center;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-500);\n  line-height: 1.35;\n}\n.step .cap b { color: var(--ink-700); font-weight: 600; }\n\n/* connector arrow between steps */\n.arrow {\n  flex: 0 0 auto;\n  align-self: flex-start;\n  margin-top: calc((650px * var(--phone-scale)) / 2 - 8px);\n  width: 46px;\n  height: 2px;\n  background: var(--ink-300);\n  position: relative;\n}\n.arrow::after {\n  content: \"\";\n  position: absolute;\n  right: -1px; top: 50%;\n  transform: translateY(-50%) rotate(45deg);\n  width: 8px; height: 8px;\n  border-top: 2px solid var(--ink-300);\n  border-right: 2px solid var(--ink-300);\n}\n.arrow.short { width: 30px; }\n.arrow .lbl {\n  position: absolute;\n  bottom: 8px; left: 50%;\n  transform: translateX(-50%);\n  white-space: nowrap;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--ink-400);\n  background: var(--canvas);\n  padding: 0 4px;\n}\n\n/* a variation group: bordered cluster of alt screens */\n.group {\n  flex: 0 0 auto;\n  align-self: flex-start;\n  border: 1.5px dashed var(--ink-300);\n  border-radius: 16px;\n  padding: 44px 18px 18px;\n  margin-top: -8px;\n  position: relative;\n  background: rgba(255,255,255,0.35);\n}\n.group > .group-label {\n  position: absolute;\n  top: -11px; left: 16px;\n  background: var(--accent);\n  color: #fff;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  font-weight: 600;\n  letter-spacing: 0.02em;\n  padding: 3px 9px;\n  border-radius: 6px;\n  text-transform: uppercase;\n  white-space: nowrap;\n}\n.group-inner {\n  display: flex;\n  gap: 22px;\n  align-items: flex-start;\n}\n.variant {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 9px;\n}\n.variant .vtag {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--ink-700);\n  border: 1.5px solid var(--ink-300);\n  border-radius: 20px;\n  padding: 3px 11px;\n  background: var(--paper);\n  white-space: nowrap;\n}\n.variant .vnote {\n  width: calc(300px * var(--phone-scale) + 10px);\n  text-align: center;\n  font-size: 11px;\n  color: var(--ink-500);\n  line-height: 1.4;\n}\n\n/* ============================================================\n   PHONE\n   ============================================================ */\n.phone-wrap {\n  transform: scale(var(--phone-scale));\n  transform-origin: top center;\n  width: 300px;\n  /* collapse the scaled height so layout reserves the right space */\n  margin-bottom: calc(650px * (var(--phone-scale) - 1));\n}\n.phone {\n  width: 300px;\n  height: 650px;\n  background: var(--ink-900);\n  border-radius: 40px;\n  padding: 9px;\n  box-shadow: 0 18px 40px -18px rgba(0,0,0,0.4), 0 2px 0 rgba(0,0,0,0.1);\n  position: relative;\n}\n.screen {\n  width: 100%;\n  height: 100%;\n  background: var(--paper);\n  border-radius: 32px;\n  overflow: hidden;\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  font-family: var(--screen-font);\n}\n/* status bar */\n.statusbar {\n  height: 30px;\n  flex: 0 0 30px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0 20px;\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--ink-900);\n}\n.statusbar .sb-right { display: flex; gap: 5px; align-items: center; }\n.statusbar .sb-right i {\n  display: block; width: 15px; height: 9px;\n  border: 1.5px solid var(--ink-900); border-radius: 2px; opacity: 0.8;\n}\n.notch {\n  position: absolute;\n  top: 9px; left: 50%; transform: translateX(-50%);\n  width: 96px; height: 22px;\n  background: var(--ink-900);\n  border-radius: 0 0 14px 14px;\n  z-index: 5;\n}\n\n/* screen body */\n.sbody {\n  flex: 1 1 auto;\n  overflow: hidden;\n  padding: 8px 20px 18px;\n  display: flex;\n  flex-direction: column;\n  gap: 13px;\n}\n.sbody.center { justify-content: center; }\n.sbody.pad-lg { padding: 16px 22px 22px; }\n\n/* nav row */\n.navrow {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  min-height: 24px;\n}\n.navrow .back {\n  width: 26px; height: 26px;\n  border-radius: 8px;\n  border: 1.5px solid var(--ink-200);\n  display: grid; place-items: center;\n  color: var(--ink-500);\n  font-size: 14px;\n}\n.navrow .nav-title { font-size: 13px; font-weight: 600; color: var(--ink-700); }\n.navrow .nav-skip { font-size: 12px; color: var(--ink-400); font-weight: 600; }\n\n/* progress steps */\n.steps {\n  display: flex; gap: 5px; align-items: center;\n}\n.steps i { height: 4px; flex: 1; border-radius: 3px; background: var(--ink-200); }\n.steps i.on { background: var(--ink-900); }\n\n/* typography inside screen */\n.s-h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; margin: 0; }\n.s-h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }\n.s-lead { font-size: 12.5px; color: var(--ink-500); line-height: 1.45; margin: 0; }\n.s-label { font-size: 11px; font-weight: 600; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.04em; margin: 0; }\n.s-tiny { font-size: 11px; color: var(--ink-400); margin: 0; }\n\n/* inputs */\n.field { display: flex; flex-direction: column; gap: 6px; }\n.input {\n  border: 1.5px solid var(--ink-300);\n  border-radius: var(--r-md);\n  background: var(--paper);\n  padding: 12px 13px;\n  font-size: 13px;\n  color: var(--ink-400);\n  font-family: var(--screen-font);\n  display: flex; align-items: center; justify-content: space-between;\n  min-height: 44px;\n}\n.input.filled { color: var(--ink-900); font-weight: 600; }\n.input .suffix { color: var(--ink-400); font-size: 12px; }\n.input.focus { border-color: var(--ink-900); box-shadow: 0 0 0 3px var(--ink-100); }\n\n/* buttons */\n.btn {\n  border-radius: var(--r-md);\n  padding: 13px 16px;\n  font-size: 14px;\n  font-weight: 700;\n  text-align: center;\n  font-family: var(--screen-font);\n  min-height: 46px;\n  display: flex; align-items: center; justify-content: center; gap: 8px;\n}\n.btn.primary { background: var(--ink-900); color: var(--paper); }\n.btn.accent { background: var(--accent); color: #fff; }\n.btn.ghost { background: transparent; color: var(--ink-700); border: 1.5px solid var(--ink-300); }\n.btn.link { background: transparent; color: var(--ink-700); font-weight: 600; min-height: 0; padding: 4px; }\n.btn.sm { min-height: 38px; padding: 9px 12px; font-size: 12.5px; }\n\n.spacer { flex: 1 1 auto; }\n\n/* cards & list rows */\n.card {\n  border: 1.5px solid var(--ink-200);\n  border-radius: var(--r-md);\n  padding: 13px;\n  display: flex;\n  flex-direction: column;\n  gap: 9px;\n  background: var(--paper);\n}\n.card.tint { background: var(--ink-100); border-color: var(--ink-200); }\n.card.accent { background: var(--accent-soft); border-color: var(--accent); }\n\n.row { display: flex; align-items: center; gap: 11px; }\n.row.between { justify-content: space-between; }\n.avatar {\n  width: 38px; height: 38px; border-radius: 50%;\n  background: var(--ink-200);\n  flex: 0 0 38px;\n  display: grid; place-items: center;\n  font-size: 13px; font-weight: 700; color: var(--ink-500);\n}\n.avatar.sq { border-radius: 10px; }\n.twoline { display: flex; flex-direction: column; gap: 3px; min-width: 0; }\n.twoline .l1 { font-size: 13px; font-weight: 600; color: var(--ink-900); }\n.twoline .l2 { font-size: 11px; color: var(--ink-500); }\n\n/* gray text bars (use sparingly for secondary content) */\n.bar { height: 9px; border-radius: 5px; background: var(--ink-200); }\n.bar.dk { background: var(--ink-300); }\n.w90{width:90%}.w80{width:80%}.w70{width:70%}.w60{width:60%}.w50{width:50%}.w40{width:40%}.w30{width:30%}\n\n/* chips */\n.chips { display: flex; flex-wrap: wrap; gap: 7px; }\n.chip {\n  font-size: 12px; font-weight: 600;\n  padding: 7px 12px; border-radius: 20px;\n  border: 1.5px solid var(--ink-300); color: var(--ink-700);\n  background: var(--paper);\n}\n.chip.on { background: var(--ink-900); color: var(--paper); border-color: var(--ink-900); }\n\n/* method/selection tiles */\n.tile {\n  border: 1.5px solid var(--ink-300);\n  border-radius: var(--r-md);\n  padding: 13px;\n  display: flex; align-items: center; gap: 11px;\n  min-height: 56px;\n}\n.tile.on { border-color: var(--ink-900); box-shadow: 0 0 0 3px var(--ink-100); }\n.tile .tico {\n  width: 34px; height: 34px; border-radius: 9px;\n  background: var(--ink-100);\n  display: grid; place-items: center;\n  font-size: 15px; flex: 0 0 34px;\n}\n.tile .tico svg { width: 18px; height: 18px; }\n.tile .chev { margin-left: auto; color: var(--ink-300); font-size: 16px; }\n\n/* big amount display */\n.amount {\n  font-size: 44px; font-weight: 700; letter-spacing: -0.03em;\n  text-align: center; color: var(--ink-900);\n}\n.amount .cur { color: var(--ink-400); font-size: 26px; vertical-align: top; }\n.amount .ph { color: var(--ink-300); }\n\n/* keypad */\n.keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }\n.keypad button, .keypad .k {\n  border: none; background: transparent;\n  font-family: var(--screen-font);\n  font-size: 22px; font-weight: 600; color: var(--ink-900);\n  padding: 12px 0; border-radius: 10px; text-align: center;\n}\n.keypad .k.fn { font-size: 15px; color: var(--ink-400); }\n\n/* image / illustration placeholder */\n.imgph {\n  border-radius: var(--r-md);\n  background-color: var(--ink-100);\n  background-image: repeating-linear-gradient(45deg, var(--ink-200) 0 8px, transparent 8px 16px);\n  border: 1.5px dashed var(--ink-300);\n  display: grid; place-items: center;\n  color: var(--ink-500);\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  text-align: center;\n  padding: 10px;\n}\n\n/* fee / comparison breakdown */\n.breakdown { display: flex; flex-direction: column; gap: 8px; }\n.brow { display: flex; justify-content: space-between; font-size: 12.5px; }\n.brow .k { color: var(--ink-500); }\n.brow .v { font-weight: 600; color: var(--ink-900); }\n.brow.total { border-top: 1.5px solid var(--ink-200); padding-top: 8px; }\n.brow.total .v { font-size: 15px; }\n\n/* comparison vs competitors */\n.compare { display: flex; flex-direction: column; gap: 7px; }\n.crow { display: flex; align-items: center; gap: 9px; font-size: 12px; }\n.crow .name { width: 64px; color: var(--ink-700); font-weight: 600; flex: 0 0 64px; }\n.crow .track { flex: 1; height: 18px; border-radius: 5px; background: var(--ink-100); position: relative; overflow: hidden; }\n.crow .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--ink-300); border-radius: 5px; }\n.crow.us .fill { background: var(--accent); }\n.crow .val { width: 50px; text-align: right; font-weight: 700; flex: 0 0 50px; }\n.crow.us .name { color: var(--accent-ink); }\n\n/* success badge */\n.success-ring {\n  width: 84px; height: 84px; border-radius: 50%;\n  border: 3px solid var(--accent);\n  display: grid; place-items: center; margin: 0 auto;\n  color: var(--accent); font-size: 38px;\n}\n.idcard {\n  border: 1.5px solid var(--ink-200); border-radius: var(--r-md);\n  padding: 14px; background: var(--ink-100);\n  display: flex; flex-direction: column; gap: 10px;\n}\n\n/* OTP boxes */\n.otp { display: flex; gap: 8px; justify-content: center; }\n.otp i {\n  width: 38px; height: 46px; border-radius: 10px;\n  border: 1.5px solid var(--ink-300);\n  display: grid; place-items: center;\n  font-size: 19px; font-weight: 700; color: var(--ink-900);\n}\n.otp i.empty { color: var(--ink-300); }\n.otp i.active { border-color: var(--ink-900); box-shadow: 0 0 0 3px var(--ink-100); }\n\n/* toggle/switch */\n.switch { width: 38px; height: 22px; border-radius: 12px; background: var(--ink-300); position: relative; flex: 0 0 38px; }\n.switch.on { background: var(--ink-900); }\n.switch::after { content:\"\"; position:absolute; top:2px; left:2px; width:18px;height:18px;border-radius:50%;background:#fff; transition: .2s; }\n.switch.on::after { left: 18px; }\n\n/* ---- proactive notification: lock screen, push, tracker ---- */\n.sbody.lock {\n  background: linear-gradient(165deg, #ecebe8, #d9d8d3);\n  justify-content: flex-start;\n  gap: 12px;\n}\n.push {\n  background: rgba(255,255,255,0.94);\n  border: 1px solid rgba(0,0,0,0.06);\n  border-radius: 16px;\n  padding: 11px 12px;\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  box-shadow: 0 10px 26px -14px rgba(0,0,0,0.4);\n  backdrop-filter: blur(2px);\n}\n.push + .push { margin-top: -4px; }\n\n.tracker { display: flex; flex-direction: column; }\n.trow { display: flex; gap: 11px; position: relative; }\n.trow .tdot {\n  width: 22px; height: 22px; border-radius: 50%; flex: 0 0 22px;\n  border: 2px solid var(--ink-300); background: var(--paper);\n  display: grid; place-items: center; font-size: 11px; color: #fff; z-index: 1;\n  margin-top: 1px;\n}\n.trow::before {\n  content: \"\"; position: absolute; left: 10px; top: 18px; bottom: -4px;\n  width: 2px; background: var(--ink-200);\n}\n.trow.last::before { display: none; }\n.trow.done .tdot { background: var(--ink-900); border-color: var(--ink-900); }\n.trow.done::before { background: var(--ink-900); }\n.trow.active .tdot { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }\n.trow.active .l1 { color: var(--accent-ink); }\n.trow.todo .l1 { color: var(--ink-400); }\n.trow.todo .l2 { color: var(--ink-300); }\n\n/* annotation note */\n.note {\n  position: relative;\n  align-self: flex-start;\n  max-width: 230px;\n  background: var(--accent-soft);\n  border: 1.5px solid var(--accent);\n  color: var(--accent-ink);\n  border-radius: 12px;\n  padding: 9px 11px;\n  font-size: 11.5px;\n  line-height: 1.4;\n  font-family: var(--font-ui);\n  margin-top: 14px;\n  box-shadow: 0 6px 16px -10px rgba(0,0,0,0.3);\n}\n.note b { font-weight: 700; }\n.note::before {\n  content: \"✱\";\n  font-family: var(--font-mono);\n  margin-right: 5px;\n  font-weight: 700;\n}\n.note-step { /* a note that sits as a rail item */\n  flex: 0 0 auto;\n  align-self: flex-start;\n  margin-top: calc((650px * var(--phone-scale)) / 2 - 60px);\n  width: 190px;\n}\n\n/* hide annotations toggle */\n[data-annotations=\"off\"] .note,\n[data-annotations=\"off\"] .note-step { display: none; }\n\n/* ============================================================\n   SKETCHY MODE\n   ============================================================ */\n[data-render=\"sketchy\"] {\n  --screen-font: var(--font-hand);\n}\n[data-render=\"sketchy\"] .topbar h1,\n[data-render=\"sketchy\"] .journey-title { font-family: var(--font-hand); letter-spacing: 0; }\n[data-render=\"sketchy\"] .phone {\n  border-radius: 42px 40px 44px 40px / 40px 44px 40px 42px;\n  box-shadow: 0 16px 36px -20px rgba(0,0,0,0.45);\n}\n[data-render=\"sketchy\"] .screen { border-radius: 33px 31px 34px 32px; }\n[data-render=\"sketchy\"] .input,\n[data-render=\"sketchy\"] .btn,\n[data-render=\"sketchy\"] .card,\n[data-render=\"sketchy\"] .tile,\n[data-render=\"sketchy\"] .chip,\n[data-render=\"sketchy\"] .imgph,\n[data-render=\"sketchy\"] .idcard {\n  border-radius: 14px 11px 13px 12px / 12px 13px 11px 14px;\n  border-style: solid;\n}\n[data-render=\"sketchy\"] .input,\n[data-render=\"sketchy\"] .card,\n[data-render=\"sketchy\"] .tile { border-color: var(--ink-400); }\n[data-render=\"sketchy\"] .s-h1,\n[data-render=\"sketchy\"] .s-h2,\n[data-render=\"sketchy\"] .amount { letter-spacing: 0; }\n[data-render=\"sketchy\"] .step:nth-child(4n) .phone-wrap { transform: scale(var(--phone-scale)) rotate(-0.7deg); }\n[data-render=\"sketchy\"] .step:nth-child(4n+2) .phone-wrap { transform: scale(var(--phone-scale)) rotate(0.6deg); }\n[data-render=\"sketchy\"] .group { border-style: solid; border-color: var(--ink-400); }\n\n/* accent = none → neutral grayscale annotations/actions */\n[data-accent=\"none\"] {\n  --accent: #6f6f76;\n  --accent-soft: #ececeb;\n  --accent-ink: #4d4d52;\n}\n[data-accent=\"teal\"] {\n  --accent: #2f8f86;\n  --accent-soft: #def0ee;\n  --accent-ink: #1d5b55;\n}\n[data-accent=\"indigo\"] {\n  --accent: #5b63c4;\n  --accent-soft: #e6e7f7;\n  --accent-ink: #383e8a;\n}\n\n/* ============================================================\n   FAILURE / RECOVERY  — alert pattern (color-independent)\n   ============================================================ */\n.alert {\n  display: flex; flex-direction: column; gap: 10px;\n  border-radius: var(--r-md);\n  padding: 14px;\n  border: 1.5px solid var(--ink-900);\n}\n.alert.caution {\n  background:\n    repeating-linear-gradient(45deg, var(--ink-100) 0 7px, transparent 7px 14px);\n  border-color: var(--ink-900);\n}\n.alert.info { background: var(--ink-100); border-color: var(--ink-400); border-style: dashed; }\n.alert-head { display: flex; align-items: center; gap: 10px; }\n.alert-ico {\n  width: 34px; height: 34px; bord
